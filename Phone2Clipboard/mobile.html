<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>手机输入 → 笔记本</title>
  <style>
    /* ── 全局重置 & 暗色主题 ── */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── 顶部标题 ── */
    .header {
      text-align: center;
      margin-bottom: 20px;
      width: 100%;
      max-width: 500px;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }
    .header p {
      font-size: 13px;
      color: #888;
    }

    /* ── 主输入卡片 ── */
    .card {
      width: 100%;
      max-width: 500px;
      background: #1a1a1a;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    /* ── 文本输入区 ── */
    .input-wrap {
      position: relative;
    }
    textarea {
      width: 100%;
      min-height: 200px;
      padding: 16px;
      padding-bottom: 48px;
      background: #111;
      border: 1px solid #333;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      line-height: 1.6;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    textarea:focus {
      border-color: #646cff;
    }
    textarea::placeholder {
      color: #555;
    }

    /* ── 字数统计 ── */
    .char-count {
      position: absolute;
      bottom: 12px;
      right: 16px;
      font-size: 12px;
      color: #555;
      pointer-events: none;
    }

    /* ── 按钮行 ── */
    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    .btn {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:active {
      transform: scale(0.97);
    }
    .btn-primary {
      background: #646cff;
      color: #fff;
    }
    .btn-primary:hover {
      background: #535bf2;
    }
    .btn-primary:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
      transform: none;
    }
    .btn-secondary {
      background: #252525;
      color: #aaa;
      border: 1px solid #333;
    }
    .btn-secondary:hover {
      background: #2a2a2a;
    }

    /* ── 状态提示 ── */
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(-80px);
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 999;
      pointer-events: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast.success {
      background: rgba(46, 160, 67, 0.9);
      color: #fff;
    }
    .toast.error {
      background: rgba(218, 54, 51, 0.9);
      color: #fff;
    }
    .toast.info {
      background: rgba(100, 108, 255, 0.9);
      color: #fff;
    }

    /* ── 历史记录 ── */
    .history {
      width: 100%;
      max-width: 500px;
      margin-top: 20px;
    }
    .history h3 {
      font-size: 14px;
      color: #666;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .history-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .history-item {
      background: #151515;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      color: #999;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: all 0.15s;
    }
    .history-item:hover {
      border-color: #444;
      background: #1a1a1a;
    }
    .history-item:active {
      transform: scale(0.98);
    }
    .history-text {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-right: 10px;
    }
    .history-time {
      font-size: 11px;
      color: #555;
      white-space: nowrap;
    }

    /* ── 底部信息 ── */
    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: #444;
      text-align: center;
    }

    /* ── 安全区域适配（刘海屏等） ── */
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      body { padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body>

<!-- 顶部标题 -->
<div class="header">
  <h1>📱 → 💻 手机输入到笔记本</h1>
  <p>输入文字，点击发送，笔记本直接 Ctrl+V 粘贴</p>
</div>

<!-- 主输入卡片 -->
<div class="card">
  <div class="input-wrap">
    <textarea id="textInput" placeholder="在此输入或粘贴内容…" autofocus autocomplete="off" autocorrect="off" spellcheck="false"></textarea>
    <span class="char-count" id="charCount">0</span>
  </div>
  <div class="btn-row">
    <button class="btn btn-secondary" id="btnClear">✕ 清空</button>
    <button class="btn btn-primary" id="btnSend">📤 发送到笔记本</button>
  </div>
</div>

<!-- 历史记录 -->
<div class="history" id="historySection" style="display:none">
  <h3>📋 最近发送</h3>
  <div class="history-list" id="historyList"></div>
</div>

<!-- 底部 -->
<div class="footer">
  仅限局域网使用 · 数据不经公网
</div>

<!-- Toast 提示 -->
<div class="toast" id="toast"></div>

<script>
  // ── 元素引用 ──
  const textInput   = document.getElementById("textInput");
  const charCount   = document.getElementById("charCount");
  const btnSend     = document.getElementById("btnSend");
  const btnClear    = document.getElementById("btnClear");
  const historyList = document.getElementById("historyList");
  const historySec  = document.getElementById("historySection");
  const toastEl     = document.getElementById("toast");

  // ── 历史记录（本地存储，最多 10 条） ──
  const HISTORY_KEY = "clip_history";
  const MAX_HISTORY = 10;

  function loadHistory() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || "[]"); }
    catch { return []; }
  }
  function saveHistory(list) {
    localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
  }
  function addHistory(text) {
    let list = loadHistory();
    // 去重：如果已有相同内容则移到最前
    list = list.filter(item => item.text !== text);
    list.unshift({ text, time: Date.now() });
    if (list.length > MAX_HISTORY) list = list.slice(0, MAX_HISTORY);
    saveHistory(list);
    renderHistory();
  }
  function renderHistory() {
    const list = loadHistory();
    if (list.length === 0) {
      historySec.style.display = "none";
      return;
    }
    historySec.style.display = "block";
    historyList.innerHTML = list.map(item => {
      const t = new Date(item.time);
      const timeStr = t.toLocaleTimeString("zh-CN", { hour12: false, hour: "2-digit", minute: "2-digit" });
      const preview = item.text.length > 50 ? item.text.slice(0, 50) + "…" : item.text;
      return `<div class="history-item" data-text="${escapeHtml(item.text)}">
        <span class="history-text">${escapeHtml(preview)}</span>
        <span class="history-time">${timeStr}</span>
      </div>`;
    }).join("");

    // 点击历史项回填到输入框
    historyList.querySelectorAll(".history-item").forEach(el => {
      el.addEventListener("click", () => {
        textInput.value = el.dataset.text;
        updateCount();
        textInput.focus();
      });
    });
  }
  function escapeHtml(str) {
    return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  // ── 字数统计 ──
  function updateCount() {
    const len = textInput.value.length;
    charCount.textContent = len.toLocaleString();
    charCount.style.color = len > 0 ? "#666" : "#444";
  }
  textInput.addEventListener("input", updateCount);

  // ── Toast 提示 ──
  let toastTimer = null;
  function showToast(msg, type = "info") {
    if (toastTimer) clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.className = `toast ${type}`;
    requestAnimationFrame(() => toastEl.classList.add("show"));
    toastTimer = setTimeout(() => toastEl.classList.remove("show"), 2500);
  }

  // ── 发送文本 ──
  async function sendText() {
    const text = textInput.value.trim();
    if (!text) {
      showToast("请输入内容", "error");
      textInput.focus();
      return;
    }

    btnSend.disabled = true;
    btnSend.innerHTML = "⏳ 发送中…";

    try {
      const res = await fetch("/submit", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text }),
      });
      const data = await res.json();

      if (data.ok) {
        if (data.dup) {
          showToast("内容未变化，已跳过", "info");
        } else {
          showToast(`✅ 已写入剪贴板（${data.len}字）`, "success");
          addHistory(text);
          textInput.value = "";
          updateCount();
        }
      } else {
        showToast(data.error || "发送失败", "error");
      }
    } catch (e) {
      showToast("网络错误，请检查连接", "error");
    } finally {
      btnSend.disabled = false;
      btnSend.innerHTML = "📤 发送到笔记本";
    }
  }

  // ── 清空输入 ──
  function clearInput() {
    textInput.value = "";
    updateCount();
    textInput.focus();
  }

  // ── 事件绑定 ──
  btnSend.addEventListener("click", sendText);
  btnClear.addEventListener("click", clearInput);

  // Ctrl+Enter 快捷发送
  textInput.addEventListener("keydown", (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
      e.preventDefault();
      sendText();
    }
  });

  // ── 初始化 ──
  updateCount();
  renderHistory();
</script>
</body>
</html>
